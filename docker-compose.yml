version: "3"

services:
  hostA:
    image: handsonsecurity/seed-ubuntu:large
    container_name: hostA
    tty: true
    cap_add:
      - NET_ADMIN
    networks:
      net-10.9.0.0:
        ipv4_address: 10.9.0.5
    volumes:
      - ./socks_client.py:/root/socks_client.py
    command: |
      bash -c '
        apt update && 
        DEBIAN_FRONTEND=noninteractive apt install -y openssh-client telnet curl tcpdump python3 python3-pip && 
        pip3 install pysocks && 
        chmod +x /root/socks_client.py && 
        ip route add 192.168.60.0/24 via 10.9.0.11 && 
        tail -f /dev/null'

  host1:
    image: handsonsecurity/seed-ubuntu:large
    container_name: host1
    tty: true
    cap_add:
      - NET_ADMIN
    networks:
      net-192.168.60.0:
        ipv4_address: 192.168.60.5
    volumes:
      - ./socks_client.py:/root/socks_client.py
    command: |
      bash -c '
        apt update && 
        DEBIAN_FRONTEND=noninteractive apt install -y openssh-server telnet curl tcpdump python3 python3-pip && 
        pip3 install pysocks && 
        chmod +x /root/socks_client.py && 
        echo "root:password" | chpasswd && 
        sed -i "s/#PermitRootLogin prohibit-password/PermitRootLogin yes/" /etc/ssh/sshd_config && 
        echo "PermitTunnel yes" >> /etc/ssh/sshd_config && 
        mkdir -p /run/sshd && /usr/sbin/sshd -D & 
        ip route del default && 
        ip route add default via 192.168.60.11 && 
        tail -f /dev/null'

  host2:
    image: handsonsecurity/seed-ubuntu:large
    container_name: host2
    tty: true
    cap_add:
      - NET_ADMIN
    networks:
      net-192.168.60.0:
        ipv4_address: 192.168.60.6
    volumes:
      - ./socks_client.py:/root/socks_client.py
    command: |
      bash -c '
        apt update && 
        DEBIAN_FRONTEND=noninteractive apt install -y openssh-server telnet curl tcpdump python3 python3-pip && 
        pip3 install pysocks && 
        chmod +x /root/socks_client.py && 
        echo "root:password" | chpasswd && 
        sed -i "s/#PermitRootLogin prohibit-password/PermitRootLogin yes/" /etc/ssh/sshd_config && 
        echo "PermitTunnel yes" >> /etc/ssh/sshd_config && 
        mkdir -p /run/sshd && /usr/sbin/sshd -D & 
        ip route del default && 
        ip route add default via 192.168.60.11 && 
        tail -f /dev/null'

  router:
    image: handsonsecurity/seed-ubuntu:large
    container_name: router
    tty: true
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      net-10.9.0.0:
        ipv4_address: 10.9.0.11
      net-192.168.60.0:
        ipv4_address: 192.168.60.11
    volumes:
      - ./socks_client.py:/root/socks_client.py
    command: |
      bash -c '
        apt update && 
        DEBIAN_FRONTEND=noninteractive apt install -y openssh-server iptables curl tcpdump python3 python3-pip && 
        pip3 install pysocks && 
        chmod +x /root/socks_client.py && 
        echo "root:password" | chpasswd && 
        sed -i "s/#PermitRootLogin prohibit-password/PermitRootLogin yes/" /etc/ssh/sshd_config && 
        echo "PermitTunnel yes" >> /etc/ssh/sshd_config && 
        mkdir -p /run/sshd && /usr/sbin/sshd -D & 
        ip route del default && 
        ip route add default via 10.9.0.1 && 
        INTERNAL_IF=$(ip link | grep -B1 "192.168.60.11" | grep -o "eth[0-1]") && 
        iptables -A FORWARD -i eth0 -p tcp -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT && 
        iptables -A FORWARD -i eth0 -p tcp --dport 22 -j ACCEPT && 
        iptables -A FORWARD -i eth0 -p tcp -j DROP && 
        iptables -A FORWARD -i $INTERNAL_IF -p tcp -d 93.184.216.0/24 -j DROP && 
        iptables -A FORWARD -i $INTERNAL_IF -p tcp -d 142.250.190.0/24 -j DROP && 
        iptables -A FORWARD -i $INTERNAL_IF -p tcp -d 104.244.42.0/24 -j DROP && 
        iptables -t nat -A POSTROUTING -o eth0 -s 192.168.60.0/24 -j MASQUERADE && 
        tail -f /dev/null'

networks:
  net-192.168.60.0:
    name: net-192.168.60.0
    ipam:
      config:
        - subnet: 192.168.60.0/24
  net-10.9.0.0:
    name: net-10.9.0.0
    ipam:
      config:
        - subnet: 10.9.0.0/24